<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; color: #333; }
    .btn { background-color: #5f35f5; color: #fff; padding: 12px 25px; text-decoration: none; border-radius: 6px; font-weight: bold; display: inline-block; }
  </style>
</head>
<body>
  <h2>Welcome to ProjectGo!</h2>
  <p>Hello {{name}},</p>
  <p>Please click the button below to verify your email and activate your account:</p>
  <div style="margin: 25px 0;">
    <a href="{{verifyUrl}}" class="btn" style="color: #fff;">Verify Email</a>
  </div>
  <p>Or copy and paste this link in your browser:</p>
  <p><a href="{{verifyUrl}}">{{verifyUrl}}</a></p>
</body>
</html>
